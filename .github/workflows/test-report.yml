name: Test Report — Autonomous CI/CD Quality Gate

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Run on every push + PR so no merge happens without a report
  push:
    branches: [main, development_2, "feature/**", "fix/**"]
  pull_request:
    branches: [main, development_2]
  # Nightly drift check — catches issues between deployments
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  # Manual trigger (useful for ad-hoc audits)
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip Playwright E2E tests (faster)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: test-report-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend: pytest with coverage + JUnit XML
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/poetry.lock

      - name: Install Poetry + dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run pytest — all test modules
        env:
          DATABASE_URL: sqlite+aiosqlite:///./finshield_test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-finshield-ci-32chars!!
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'dGVzdC1rZXktZm9yLXB5dGVzdC1vbmx5LTMyYnl0ZXM=' }}
          APP_ENV: development
          RESEND_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
          TWILIO_FROM_NUMBER: ""
        run: |
          poetry run pytest tests/ \
            --tb=short \
            --junitxml=test-results/pytest-results.xml \
            --cov=app \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:test-results/htmlcov \
            --cov-fail-under=60 \
            -v 2>&1 | tee test-results/pytest-output.txt || true

      - name: Upload backend test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend: Vitest unit tests + coverage
  # ──────────────────────────────────────────────────────────────────────────
  frontend-unit-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Vitest with coverage
        run: |
          npm run test:coverage -- \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=test-results/vitest-junit.xml \
            2>&1 | tee test-results/vitest-output.txt || true

      - name: Upload frontend unit test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-unit-test-results
          path: frontend/test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Frontend: Playwright E2E tests
  # ──────────────────────────────────────────────────────────────────────────
  frontend-e2e-tests:
    name: Frontend E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]
    if: >
      github.event.inputs.skip_e2e != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
       github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    defaults:
      run:
        working-directory: frontend

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/poetry.lock

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies + start API
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./e2e_test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: e2e-test-secret-key-minimum-32-chars
          ENCRYPTION_KEY: dGVzdC1rZXktZm9yLXB5dGVzdC1vbmx5LTMyYnl0ZXM=
          APP_ENV: development
          CORS_ORIGINS: http://localhost:3000
          RESEND_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
        run: |
          pip install poetry -q
          poetry install --no-interaction -q
          PYTHONPATH=. poetry run uvicorn app.main:app --host 0.0.0.0 --port 8003 &
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8003/api/v1/health && echo "Backend ready" && break || sleep 3
          done

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8003/api/v1
          NEXT_PUBLIC_WS_URL: http://localhost:8003
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: e2e-nextauth-secret-change-me
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8003/api/v1
          NEXT_PUBLIC_WS_URL: http://localhost:8003
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: e2e-nextauth-secret-change-me
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          npx playwright test \
            --reporter=html,junit \
            --output=test-results/e2e-traces \
            2>&1 | tee test-results/playwright-output.txt || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-e2e-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Aggregate test report (always runs, posts to Step Summary)
  # ──────────────────────────────────────────────────────────────────────────
  test-report:
    name: Aggregate Test Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests, frontend-e2e-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      # Download all test artifacts
      - name: Download backend results
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: reports/backend
        continue-on-error: true

      - name: Download frontend unit test results
        uses: actions/download-artifact@v4
        with:
          name: frontend-unit-test-results
          path: reports/frontend-unit
        continue-on-error: true

      - name: Download Playwright results
        uses: actions/download-artifact@v4
        with:
          name: playwright-e2e-results
          path: reports/playwright
        continue-on-error: true

      # Parse JUnit XML results and write GitHub Step Summary
      - name: Generate consolidated test report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function parseJUnit(xmlPath) {
              if (!fs.existsSync(xmlPath)) return null;
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const tests  = (xml.match(/tests="(\d+)"/)?.[1]  || '0');
              const fails  = (xml.match(/failures="(\d+)"/)?.[1] || '0');
              const errors = (xml.match(/errors="(\d+)"/)?.[1]  || '0');
              const skipped= (xml.match(/skipped="(\d+)"/)?.[1] || '0');
              const time   = (xml.match(/time="([0-9.]+)"/)?.[1]  || '?');
              return { tests: +tests, fails: +fails, errors: +errors, skipped: +skipped, time };
            }

            function parseCoverage(xmlPath) {
              if (!fs.existsSync(xmlPath)) return null;
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const rate = xml.match(/line-rate="([0-9.]+)"/)?.[1];
              return rate ? Math.round(+rate * 100) : null;
            }

            function statusIcon(fails, errors) {
              if (fails > 0 || errors > 0) return '❌';
              return '✅';
            }

            const backend = parseJUnit('reports/backend/pytest-results.xml');
            const frontendUnit = parseJUnit('reports/frontend-unit/vitest-junit.xml');
            const e2e = parseJUnit('reports/playwright/test-results/e2e-junit.xml');
            const coverage = parseCoverage('reports/backend/coverage.xml');

            const now = new Date().toUTCString();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const commit = process.env.GITHUB_SHA?.slice(0, 8) ?? 'unknown';
            const branch = process.env.GITHUB_REF_NAME ?? 'unknown';

            let summary = `# 🧪 FinShield AI — Test Report\n\n`;
            summary += `| Field | Value |\n|---|---|\n`;
            summary += `| **Branch** | \`${branch}\` |\n`;
            summary += `| **Commit** | \`${commit}\` |\n`;
            summary += `| **Run** | [View run](${runUrl}) |\n`;
            summary += `| **Generated** | ${now} |\n\n`;

            summary += `## 📊 Results Summary\n\n`;
            summary += `| Suite | Tests | Passed | Failed | Skipped | Duration | Status |\n`;
            summary += `|---|---|---|---|---|---|---|\n`;

            if (backend) {
              const passed = backend.tests - backend.fails - backend.errors - backend.skipped;
              summary += `| **Backend (pytest)** | ${backend.tests} | ${passed} | ${backend.fails + backend.errors} | ${backend.skipped} | ${backend.time}s | ${statusIcon(backend.fails, backend.errors)} |\n`;
            } else {
              summary += `| **Backend (pytest)** | — | — | — | — | — | ⚠️ No results |\n`;
            }

            if (frontendUnit) {
              const passed = frontendUnit.tests - frontendUnit.fails - frontendUnit.errors - frontendUnit.skipped;
              summary += `| **Frontend (Vitest)** | ${frontendUnit.tests} | ${passed} | ${frontendUnit.fails + frontendUnit.errors} | ${frontendUnit.skipped} | ${frontendUnit.time}s | ${statusIcon(frontendUnit.fails, frontendUnit.errors)} |\n`;
            } else {
              summary += `| **Frontend (Vitest)** | — | — | — | — | — | ⚠️ No results |\n`;
            }

            if (e2e) {
              const passed = e2e.tests - e2e.fails - e2e.errors - e2e.skipped;
              summary += `| **E2E (Playwright)** | ${e2e.tests} | ${passed} | ${e2e.fails + e2e.errors} | ${e2e.skipped} | ${e2e.time}s | ${statusIcon(e2e.fails, e2e.errors)} |\n`;
            } else {
              summary += `| **E2E (Playwright)** | — | — | — | — | — | ⚠️ Skipped or no results |\n`;
            }

            summary += `\n## 📈 Coverage\n\n`;
            if (coverage !== null) {
              const bar = '█'.repeat(Math.floor(coverage / 5)) + '░'.repeat(20 - Math.floor(coverage / 5));
              const coverageStatus = coverage >= 60 ? '✅' : coverage >= 40 ? '⚠️' : '❌';
              summary += `| Metric | Value |\n|---|---|\n`;
              summary += `| **Backend line coverage** | ${coverageStatus} ${coverage}% \`${bar}\` |\n`;
              summary += `| **Coverage gate (≥60%)** | ${coverage >= 60 ? '✅ Passed' : '❌ Below threshold'} |\n`;
            } else {
              summary += `> ⚠️ Coverage data not available.\n`;
            }

            // Overall quality gate
            const allPassed =
              (!backend || (backend.fails === 0 && backend.errors === 0)) &&
              (!frontendUnit || (frontendUnit.fails === 0 && frontendUnit.errors === 0)) &&
              (!e2e || (e2e.fails === 0 && e2e.errors === 0)) &&
              (coverage === null || coverage >= 60);

            summary += `\n## ${allPassed ? '✅ Quality Gate: PASSED' : '❌ Quality Gate: FAILED'}\n\n`;
            if (!allPassed) {
              summary += `> **Action required:** Review failing tests before merging.\n`;
            }

            summary += `\n---\n*Generated automatically by \`.github/workflows/test-report.yml\`*\n`;

            await core.summary.addRaw(summary).write();
            console.log('Test report written to step summary.');

      # Post report as a PR comment when triggered from a PR
      - name: Post test results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function parseJUnit(xmlPath) {
              if (!fs.existsSync(xmlPath)) return null;
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const tests = +(xml.match(/tests="(\d+)"/)?.[1] || 0);
              const fails = +(xml.match(/failures="(\d+)"/)?.[1] || 0);
              const errors = +(xml.match(/errors="(\d+)"/)?.[1] || 0);
              return { tests, fails, errors, passed: tests - fails - errors };
            }

            const backend = parseJUnit('reports/backend/pytest-results.xml');
            const unit = parseJUnit('reports/frontend-unit/vitest-junit.xml');
            const e2e = parseJUnit('reports/playwright/test-results/e2e-junit.xml');

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            let body = `## 🧪 FinShield Test Report\n\n`;
            body += `| Suite | Tests | Passed | Failed |\n|---|---|---|---|\n`;
            if (backend) body += `| Backend (pytest)  | ${backend.tests} | ${backend.passed} | ${backend.fails + backend.errors} |\n`;
            if (unit)    body += `| Frontend (Vitest) | ${unit.tests} | ${unit.passed} | ${unit.fails + unit.errors} |\n`;
            if (e2e)     body += `| E2E (Playwright)  | ${e2e.tests} | ${e2e.passed} | ${e2e.fails + e2e.errors} |\n`;
            body += `\n[📋 Full report](${runUrl})`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # Publish test results to GitHub Checks (for PR annotations)
      - name: Publish backend test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/backend/pytest-results.xml
          check_name: "Backend Tests (pytest)"
          comment_title: "Backend Test Results"
          fail_on: "test failures"
        continue-on-error: true

      - name: Publish frontend unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/frontend-unit/vitest-junit.xml
          check_name: "Frontend Tests (Vitest)"
          comment_title: "Frontend Unit Test Results"
          fail_on: "test failures"
        continue-on-error: true

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/playwright/test-results/e2e-junit.xml
          check_name: "E2E Tests (Playwright)"
          comment_title: "E2E Test Results"
          fail_on: "test failures"
        continue-on-error: true

      # Final quality gate — fail the workflow if any suite has failures
      - name: Quality Gate — fail if tests failed
        if: always()
        run: |
          BACKEND_FAIL=0
          UNIT_FAIL=0

          # Check backend
          if [ -f reports/backend/pytest-results.xml ]; then
            FAILURES=$(grep -o 'failures="[0-9]*"' reports/backend/pytest-results.xml | grep -o '[0-9]*' | head -1)
            ERRORS=$(grep -o 'errors="[0-9]*"' reports/backend/pytest-results.xml | grep -o '[0-9]*' | head -1)
            if [ "${FAILURES:-0}" -gt 0 ] || [ "${ERRORS:-0}" -gt 0 ]; then
              echo "❌ Backend tests have ${FAILURES:-0} failures and ${ERRORS:-0} errors"
              BACKEND_FAIL=1
            fi
          fi

          # Check frontend unit
          if [ -f reports/frontend-unit/vitest-junit.xml ]; then
            FAILURES=$(grep -o 'failures="[0-9]*"' reports/frontend-unit/vitest-junit.xml | grep -o '[0-9]*' | head -1)
            ERRORS=$(grep -o 'errors="[0-9]*"' reports/frontend-unit/vitest-junit.xml | grep -o '[0-9]*' | head -1)
            if [ "${FAILURES:-0}" -gt 0 ] || [ "${ERRORS:-0}" -gt 0 ]; then
              echo "❌ Frontend unit tests have ${FAILURES:-0} failures and ${ERRORS:-0} errors"
              UNIT_FAIL=1
            fi
          fi

          if [ "$BACKEND_FAIL" -eq 1 ] || [ "$UNIT_FAIL" -eq 1 ]; then
            echo "❌ Quality gate FAILED — one or more test suites are failing"
            exit 1
          fi

          echo "✅ Quality gate passed — all test suites are green"
