name: CD — Terraform + ECS Deploy + Rollback

on:
  workflow_run:
    workflows: ["CI — Lint · Test · Build · Push"]
    types: [completed]
    branches: [main, development_2]

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: latest

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"

jobs:
  # ──────────────────────────────────────────────────────────────────
  guard:
    name: Guard — only deploy on CI success
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding with deployment"

  # ──────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Plan + Apply
    runs-on: ubuntu-latest
    needs: guard
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      cluster_name:         ${{ steps.tf_output.outputs.cluster_name }}
      backend_service_name: ${{ steps.tf_output.outputs.backend_service }}
      frontend_service_name: ${{ steps.tf_output.outputs.frontend_service }}
      alb_dns_name:         ${{ steps.tf_output.outputs.alb_dns }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment || 'staging' }}" \
            -var="backend_image_tag=${{ github.event.inputs.image_tag || 'latest' }}" \
            -var="frontend_image_tag=${{ github.event.inputs.image_tag || 'latest' }}" \
            -var="github_repo=${{ github.repository }}" \
            -var="acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt

      - name: Post plan to PR
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_output
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)"     >> "$GITHUB_OUTPUT"
          echo "backend_service=$(terraform output -raw backend_service_name)"  >> "$GITHUB_OUTPUT"
          echo "frontend_service=$(terraform output -raw frontend_service_name)" >> "$GITHUB_OUTPUT"
          echo "alb_dns=$(terraform output -raw alb_dns_name)"              >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: ECS Rolling Deploy
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      previous_backend_task_def:  ${{ steps.snapshot.outputs.prev_backend }}
      previous_frontend_task_def: ${{ steps.snapshot.outputs.prev_frontend }}
      deploy_status: ${{ steps.deploy_result.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Snapshot current task definition revisions for rollback ──
      - name: Snapshot current task definitions
        id: snapshot
        run: |
          CLUSTER="${{ needs.terraform.outputs.cluster_name }}"
          BACKEND_SVC="${{ needs.terraform.outputs.backend_service_name }}"
          FRONTEND_SVC="${{ needs.terraform.outputs.frontend_service_name }}"

          PREV_BACKEND=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$BACKEND_SVC" \
            --query 'services[0].taskDefinition' \
            --output text)

          PREV_FRONTEND=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$FRONTEND_SVC" \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "prev_backend=$PREV_BACKEND"   >> "$GITHUB_OUTPUT"
          echo "prev_frontend=$PREV_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "Snapshot — backend: $PREV_BACKEND  frontend: $PREV_FRONTEND"

      # ── Register new task definitions with updated image tags ──
      - name: Render new backend task definition
        id: render_backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: finshield-staging-backend
          container-name: backend
          image: "${{ secrets.ECR_BACKEND_URL }}:${{ github.event.inputs.image_tag || 'latest' }}"

      - name: Render new frontend task definition
        id: render_frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: finshield-staging-frontend
          container-name: frontend
          image: "${{ secrets.ECR_FRONTEND_URL }}:${{ github.event.inputs.image_tag || 'latest' }}"

      # ── Deploy backend ──
      - name: Deploy backend service
        id: deploy_backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_backend.outputs.task-definition }}
          service: ${{ needs.terraform.outputs.backend_service_name }}
          cluster: ${{ needs.terraform.outputs.cluster_name }}
          wait-for-service-stability: true
          wait-for-minutes: 8

      # ── Deploy frontend ──
      - name: Deploy frontend service
        id: deploy_frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_frontend.outputs.task-definition }}
          service: ${{ needs.terraform.outputs.frontend_service_name }}
          cluster: ${{ needs.terraform.outputs.cluster_name }}
          wait-for-service-stability: true
          wait-for-minutes: 8

      - name: Mark deploy result
        id: deploy_result
        if: always()
        run: |
          if [[ "${{ steps.deploy_backend.outcome }}" == "success" && \
                "${{ steps.deploy_frontend.outcome }}" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────
  health-check:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: [terraform, deploy]
    if: needs.deploy.outputs.deploy_status == 'success'
    outputs:
      health_ok: ${{ steps.check.outputs.ok }}

    steps:
      - name: Backend health check
        id: check
        run: |
          ALB="${{ needs.terraform.outputs.alb_dns_name }}"
          URL="http://${ALB}/api/v1/health"
          echo "Polling $URL"
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $CODE"
            if [[ "$CODE" == "200" ]]; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done
          echo "ok=false" >> "$GITHUB_OUTPUT"
          exit 1

  # ──────────────────────────────────────────────────────────────────
  rollback:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: [terraform, deploy, health-check]
    if: |
      always() && (
        needs.deploy.outputs.deploy_status == 'failed' ||
        needs.health-check.outputs.health_ok == 'false'
      )

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback backend to previous revision
        run: |
          CLUSTER="${{ needs.terraform.outputs.cluster_name }}"
          BACKEND_SVC="${{ needs.terraform.outputs.backend_service_name }}"
          PREV_BACKEND="${{ needs.deploy.outputs.previous_backend_task_def }}"

          if [[ -n "$PREV_BACKEND" && "$PREV_BACKEND" != "None" ]]; then
            echo "Rolling back backend to: $PREV_BACKEND"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$BACKEND_SVC" \
              --task-definition "$PREV_BACKEND" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          else
            echo "No previous backend task definition found — cannot rollback"
          fi

      - name: Rollback frontend to previous revision
        run: |
          CLUSTER="${{ needs.terraform.outputs.cluster_name }}"
          FRONTEND_SVC="${{ needs.terraform.outputs.frontend_service_name }}"
          PREV_FRONTEND="${{ needs.deploy.outputs.previous_frontend_task_def }}"

          if [[ -n "$PREV_FRONTEND" && "$PREV_FRONTEND" != "None" ]]; then
            echo "Rolling back frontend to: $PREV_FRONTEND"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$FRONTEND_SVC" \
              --task-definition "$PREV_FRONTEND" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          else
            echo "No previous frontend task definition found — cannot rollback"
          fi

      - name: Create GitHub deployment failure annotation
        uses: actions/github-script@v9
        with:
          script: |
            core.error(`Deployment FAILED and was rolled back.
            Commit: ${{ github.sha }}
            Previous backend task: ${{ needs.deploy.outputs.previous_backend_task_def }}
            Previous frontend task: ${{ needs.deploy.outputs.previous_frontend_task_def }}
            Check ECS console for details.`);

  # ──────────────────────────────────────────────────────────────────
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [terraform, deploy, health-check]
    if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Post deployment summary
        uses: actions/github-script@v9
        env:
          DEPLOY_STATUS: ${{ needs.deploy.outputs.deploy_status }}
          HEALTH_OK:     ${{ needs.health-check.outputs.health_ok }}
          ALB_DNS:       ${{ needs.terraform.outputs.alb_dns_name }}
        with:
          script: |
            const status = process.env.DEPLOY_STATUS;
            const health = process.env.HEALTH_OK;
            const alb    = process.env.ALB_DNS;
            const icon   = (status === 'success' && health === 'true') ? '✅' : '❌';
            const msg    = `${icon} **FinShield AI Deployment**\n`
              + `- SHA: \`${{ github.sha }}\`\n`
              + `- Environment: staging\n`
              + `- ALB: \`${alb}\`\n`
              + `- Deploy: ${status}\n`
              + `- Health: ${health}`;
            core.notice(msg);
