name: CI — Lint · Test · Build · Push

on:
  push:
    branches: [main, development_2, "feature/**", "fix/**"]
  pull_request:
    branches: [main, development_2]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/poetry.lock

      - name: Install Poetry + dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check app/ tests/ || true

      - name: Ruff format check
        run: poetry run ruff format --check app/ || true

  # ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend · Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/poetry.lock

      - name: Install Poetry + dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret-key-minimum-32-chars!!
          # Fernet key: base64url of exactly 32 bytes
          ENCRYPTION_KEY: dGVzdC1rZXktZm9yLXB5dGVzdC1vbmx5LTMyYnl0ZXM=
          # Must be "development" so create_all_tables() runs in lifespan
          APP_ENV: development
          LOG_LEVEL: WARNING
          RESEND_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
          TWILIO_FROM_NUMBER: ""
        run: |
          poetry run pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --junit-xml=test-results.xml \
            -v \
            -p no:warnings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/test-results.xml
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 14

      - name: Publish test report (PR)
        uses: mikepenz/action-junit-report@v6
        if: always() && github.event_name == 'pull_request'
        with:
          report_paths: backend/test-results.xml
          check_name: "Backend Tests"
          fail_on_failure: true

  # ──────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend · Lint + Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - name: Type check
        run: npm run type-check || npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend · Vitest Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage
        run: |
          npm run test:coverage -- \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=test-results.xml || true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            frontend/test-results.xml
            frontend/coverage/
          retention-days: 14

      - name: Publish test report (PR)
        uses: mikepenz/action-junit-report@v6
        if: always() && github.event_name == 'pull_request'
        with:
          report_paths: frontend/test-results.xml
          check_name: "Frontend Tests"
          fail_on_failure: true

  # ──────────────────────────────────────────────────────────────────
  frontend-e2e:
    name: Frontend · Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend for E2E
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./e2e_test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: e2e-test-secret-key-minimum-32-chars!!
          ENCRYPTION_KEY: dGVzdC1rZXktZm9yLXB5dGVzdC1vbmx5LTMyYnl0ZXM=
          APP_ENV: development
          CORS_ORIGINS: http://localhost:3000
          RESEND_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
        run: |
          pip install poetry -q
          poetry install --no-interaction -q
          PYTHONPATH=. poetry run uvicorn app.main:app --host 0.0.0.0 --port 8003 &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8003/api/v1/health && break || sleep 2
          done

      - name: Build and start frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8003/api/v1
          NEXT_PUBLIC_WS_URL: http://localhost:8003
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: e2e-nextauth-secret-change-me
        run: |
          npm ci --legacy-peer-deps
          npm run build
          npm start &
          sleep 8

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=html,junit

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker · Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development_2'
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ECR_BACKEND_URL }}:${{ steps.meta.outputs.sha }}
            ${{ secrets.ECR_BACKEND_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ECR_FRONTEND_URL }}:${{ steps.meta.outputs.sha }}
            ${{ secrets.ECR_FRONTEND_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
