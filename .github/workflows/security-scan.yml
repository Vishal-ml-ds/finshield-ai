name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/javascript
            p/typescript
            p/security-audit
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  secrets-scan:
    name: Secrets Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { context: "./backend", file: "./backend/Dockerfile", name: "backend" }
          - { context: "./frontend", file: "./frontend/Dockerfile", name: "frontend" }
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.target.context }}
          file: ${{ matrix.target.file }}
          push: false
          tags: finshield-${{ matrix.target.name }}:scan
          load: true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: finshield-${{ matrix.target.name }}:scan
          format: sarif
          output: trivy-${{ matrix.target.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.target.name }}.sarif
          category: trivy-${{ matrix.target.name }}

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pip-audit
        run: pip install pip-audit poetry

      - name: Python dependency audit
        working-directory: backend
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          pip-audit -r requirements.txt --format json --output pip-audit.json || true
          pip-audit -r requirements.txt || true

      - name: Node dependency audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --json > npm-audit.json || true
          npm audit || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-reports
          path: |
            backend/pip-audit.json
            frontend/npm-audit.json
