version: 2

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python
    reviewers:
      - finshield-team
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(py)"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - javascript
    reviewers:
      - finshield-team
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(js)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    reviewers:
      - finshield-team
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(ci)"

  - package-ecosystem: terraform
    directory: /infrastructure/terraform
    schedule:
      interval: monthly
    labels:
      - dependencies
      - infrastructure
    reviewers:
      - finshield-team
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(tf)"
